name: Daily News

on:
  schedule:
    - cron: "33 0,12 * * *"
  workflow_dispatch:

concurrency:
  group: daily-master
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Start RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub:latest
          for i in $(seq 1 60); do
            curl -s http://localhost:1200 > /dev/null 2>&1 && echo "RSSHub ready (${i}s)" && break
            sleep 2
          done
          curl -s http://localhost:1200 | head -3

      - name: Run TrendRadar
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          STORAGE_BACKEND: auto
          GITHUB_ACTIONS: true
        run: python -m trendradar
